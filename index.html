<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Raisya Maulidina</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff1f2, #fbcfe8);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; text-align: center;
        }
        .card {
            background: white; padding: 40px; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 350px; width: 85%;
        }
        h1 { color: #be185d; font-size: 22px; margin-bottom: 10px; }
        p { color: #4b5563; font-size: 15px; margin-bottom: 30px; line-height: 1.5; }
        
        /* Container tombol agar sejajar di awal */
        .btn-container {
            display: flex; 
            justify-content: center; 
            gap: 20px; /* Jarak antar tombol */
            align-items: center;
            position: relative;
            min-height: 50px;
        }
        
        .btn {
            padding: 12px 25px; border-radius: 50px; border: none;
            cursor: pointer; font-weight: bold; font-size: 16px;
            transition: transform 0.2s;
            display: inline-block;
        }
        
        #btnIya { background-color: #ec4899; color: white; box-shadow: 0 4px 10px rgba(236, 72, 153, 0.3); }
        #btnIya:hover { transform: scale(1.1); }
        
        #btnGa {
            background-color: #f3f4f6; color: #6b7280;
            position: relative; /* Tetap sejajar di awal */
            z-index: 10;
        }

        .floating-heart {
            color: #f472b6; font-size: 40px; margin-bottom: 15px;
            animation: bounce 1.5s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div class="floating-heart">💖</div>
    <h1>Maafin aku ya, Raisya?</h1>
    <p>Raisya Maulidina yang paling cantik, jangan marah lagi ya? Aku minta maaf banget.. ✨</p>
    
    <div class="btn-container">
        <button id="btnIya" class="btn" onclick="berhasil()">Iyaa</button>
        <button id="btnGa" class="btn" onmouseover="lari(this)" onclick="lari(this)">Enggak</button>
    </div>
</div>

<script>
    function lari(btn) {
        // Mengubah posisi dari relative ke fixed agar bisa lari ke seluruh layar
        btn.style.position = 'fixed';
        
        // Menghitung area aman agar tidak keluar layar
        const padding = 50;
        const x = Math.random() * (window.innerWidth - btn.offsetWidth - padding);
        const y = Math.random() * (window.innerHeight - btn.offsetHeight - padding);
        
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
    }

    function berhasil() {
        document.getElementById('mainCard').innerHTML = `
            <div style="font-size: 50px; margin-bottom: 10px;">🥰</div>
            <h1>Makasih Raisya!</h1>
            <p>Aku tahu kata-kata mungkin gak cukup buat memperbaiki semuanya, tapi aku cuma mau bilang kalau aku benar-benar minta maaf.

Raisya yang cantik, jangan marah lama-lama ya? Dunia terasa kurang ceria kalau kamu lagi sedih atau kesal. <br> Senyum lagi ya? ✨</p>
            <p style="font-size: 12px; color: #ec4899; margin-top: 10px;">Kabari aku ya kalau udah liat ini!</p>
        `;
    }
</script>

</body>
</html>
